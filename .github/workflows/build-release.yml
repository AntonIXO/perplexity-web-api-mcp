name: Build & Release

# One-click / tag-driven release for the fork.
#
# Two ways to cut a release:
#   1. Manual (one-click): Actions tab -> "Build & Release" -> Run workflow,
#      optionally type a tag like "v0.12.0". If left blank, a dev build named
#      "manual-<run_number>" is produced (marked as a prerelease).
#   2. Tag push: `git tag v0.12.0 && git push origin v0.12.0`.
#
# Produces static-ish binaries for Linux/macOS/Windows and attaches them to a
# GitHub Release. No npm publish, no external secrets required (uses the
# built-in GITHUB_TOKEN).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.12.0). Leave blank for a manual dev build."
        required: false
        type: string
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    # A single broken target must not block the release. The release job
    # filters out missing artifacts and uploads whatever did build.
    continue-on-error: true
    strategy:
      # Don't cancel siblings on first failure — partial releases are still
      # useful, and one flaky runner should not block the whole release.
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          # macOS: ship arm64 only. New Macs are all Apple Silicon, and Intel
          # Macs can run arm64 binaries via Rosetta 2. Dropping x86_64-apple-
          # darwin also sidesteps the chronically-queued `macos-13` runner.
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      # BoringSSL (via the rquest crate) needs a C/C++ toolchain + NASM on Windows.
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        uses: seanmiddleditch/gha-setup-ninja@master
      - name: Set up LLVM/libclang (Windows)
        if: runner.os == 'Windows'
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "18"
      - name: Set CMake generator to Ninja (Windows)
        if: runner.os == 'Windows'
        run: echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }} --bin perplexity-web-api-mcp

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/perplexity-web-api-mcp
          DIST=perplexity-web-api-mcp-${{ matrix.target }}
          mkdir -p "$DIST"
          cp "$BIN" "$DIST/"
          cp README.md LICENSE "$DIST/" 2>/dev/null || true
          tar -czf "$DIST.tar.gz" "$DIST"
          shasum -a 256 "$DIST.tar.gz" > "$DIST.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/perplexity-web-api-mcp.exe"
          $dist = "perplexity-web-api-mcp-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item $bin $dist
          Copy-Item README.md,LICENSE $dist -ErrorAction SilentlyContinue
          Compress-Archive -Path $dist -DestinationPath "$dist.zip"
          (Get-FileHash "$dist.zip" -Algorithm SHA256).Hash.ToLower() + "  $dist.zip" | Out-File "$dist.zip.sha256" -Encoding ascii

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            perplexity-web-api-mcp-${{ matrix.target }}.tar.gz*
            perplexity-web-api-mcp-${{ matrix.target }}.zip*
          # If a target failed, the artifact is missing — let the upload
          # silently skip rather than failing this already-allowed-to-fail
          # job again with a confusing error.
          if-no-files-found: ignore

  release:
    name: Create GitHub Release
    needs: build
    # `needs: build` with default behaviour makes the release run only if ALL
    # builds succeed. We want it to run on partial success too.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
          # Some targets may have failed and not uploaded — don't error.
          fail-on-unmatched-globs: false

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Guard - skip release if no builds succeeded
        id: guard
        shell: bash
        run: |
          if [ -z "$(ls -A dist 2>/dev/null)" ]; then
            echo "::warning::No build artifacts were produced — every target failed. Skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Artifacts: $(ls -la dist/ | tail -n +2 | wc -l) file(s)"
          fi

      - name: Create / update release
        if: steps.guard.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: dist/*
          # We just verified the dir isn't empty, so missing files are an
          # unexpected glob mismatch — error.
          fail_on_unmatched_files: true
